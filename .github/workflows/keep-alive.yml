name: Supabase keep-alive

# Empêche la mise en pause du projet Supabase (free tier : pause après 7j sans activité).
on:
  schedule:
    - cron: '17 6 */2 * *' # tous les 2 jours à 06:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/players?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "HTTP $code"
          test "$code" = "200"
